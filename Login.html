<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in</title>
<style>
  :root {
    --ink: #1a1b1e;
    --muted: #6b6f76;
    --line: #e3e1db;
    --field: #f7f6f3;
    --accent: #c4543a;
    --accent-dark: #a8442e;
    --panel: #14211f;
    --panel-text: #f1efe9;
    --radius: 12px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: #ece9e2;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 860px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    box-shadow: 0 24px 60px -20px rgba(20, 33, 31, 0.35);
  }

  /* Left brand panel */
  .panel {
    background: var(--panel);
    color: var(--panel-text);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .panel::after {
    content: "";
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent), transparent 70%);
    opacity: 0.5;
    bottom: -60px;
    right: -60px;
  }

  .mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .mark .dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    background: var(--accent);
  }

  .panel h2 {
    font-size: 1.7rem;
    line-height: 1.25;
    margin: 0 0 6px;
    font-weight: 600;
  }

  .panel p {
    margin: 0;
    color: rgba(241, 239, 233, 0.7);
    font-size: 0.95rem;
    line-height: 1.5;
  }

  /* Right form */
  .form-wrap {
    padding: 48px 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .form-wrap h1 {
    margin: 0 0 6px;
    font-size: 1.5rem;
    font-weight: 600;
  }

  .sub {
    margin: 0 0 28px;
    color: var(--muted);
    font-size: 0.92rem;
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 7px;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--field);
    font-size: 0.95rem;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(196, 84, 58, 0.15);
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    font-size: 0.85rem;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--muted);
    cursor: pointer;
  }

  .remember input { accent-color: var(--accent); }

  a.link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  a.link:hover { text-decoration: underline; }

  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-dark); }
  button:focus-visible {
    outline: 3px solid rgba(196, 84, 58, 0.4);
    outline-offset: 2px;
  }

  .signup {
    margin: 22px 0 0;
    text-align: center;
    font-size: 0.88rem;
    color: var(--muted);
  }

  .error {
    color: var(--accent-dark);
    font-size: 0.8rem;
    margin-top: 6px;
    min-height: 1em;
  }

  @media (max-width: 720px) {
    .card { grid-template-columns: 1fr; max-width: 420px; }
    .panel { display: none; }
    .form-wrap { padding: 40px 32px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <main class="card">
    <section class="panel">
      <div class="mark"><span class="dot"></span> Northbeam</div>
      <div>
        <h2>Welcome back.</h2>
        <p>Sign in to pick up where you left off — your projects, drafts, and settings are right where you left them.</p>
      </div>
    </section>

    <section class="form-wrap">
      <h1>Sign in</h1>
      <p class="sub">Enter your details to continue.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>

        <div class="row">
          <label class="remember"><input type="checkbox" name="remember"> Remember me</label>
          <a class="link" href="#">Forgot password?</a>
        </div>

        <button type="submit">Sign in</button>
        <p class="error" id="formError" role="alert"></p>
      </form>

      <p class="signup">New here? <a class="link" href="#">Create an account</a></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('formError');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      const name = form.value.trim()

      const email = form.email.value.trim();
      const password = form.password.value;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        form.email.focus();
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        form.password.focus();
        return;
      }




      // Front-end only: wire this up to your backend / auth endpoint.
      errorEl.style.color = '#2e7d32';
      errorEl.textContent = 'Looks good — connect this form to your authentication endpoint.';
    });
  </script>
</body>
</html>
